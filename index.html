<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>40 Below</title>
    <meta
      name="description"
      content="See the temperature where you are in Fahrenheit and Celsius, check the hourly forecast, and share a clean temperature card in seconds."
    />
    <meta property="og:title" content="40 Below" />
    <meta
      property="og:description"
      content="See the temperature where you are in Fahrenheit and Celsius, check the hourly forecast, and share a clean temperature card in seconds."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fruitstandsoftware.com/" />
    <meta property="og:image" content="https://fruitstandsoftware.com/SocialImage.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="40 Below" />
    <meta
      name="twitter:description"
      content="See the temperature where you are in Fahrenheit and Celsius, check the hourly forecast, and share a clean temperature card in seconds."
    />
    <meta name="twitter:image" content="https://fruitstandsoftware.com/SocialImage.png" />
    <link rel="canonical" href="https://fruitstandsoftware.com/" />
    <meta http-equiv="refresh" content="0; url=/en-US/" />
    <script>
      const DEFAULT_LOCALE = "en-US";
      const LOCALE_STORAGE_KEY = "fruitstandsoftware.locale";
      const AVAILABLE_LOCALES = ["ar-SA", "da", "de-DE", "en-CA", "en-GB", "en-US", "es-ES", "fi", "fr-FR", "hi", "it", "ja", "ko", "nl-NL", "no", "pl", "pt-BR", "sv", "tr", "zh-Hans", "zh-Hant"];

      function normalizeLocale(locale) {
        return (locale || "").trim();
      }

      function sameLanguageLocale(requestedLocale, availableLocales) {
        const requestedBase = normalizeLocale(requestedLocale).split("-")[0].toLowerCase();
        if (!requestedBase) {
          return "";
        }

        return (
          availableLocales.find((candidate) => candidate.split("-")[0].toLowerCase() === requestedBase) || ""
        );
      }

      function resolveLocale(requestedLocales) {
        for (const candidate of requestedLocales) {
          const normalized = normalizeLocale(candidate);
          if (!normalized) {
            continue;
          }

          const exactLocale = AVAILABLE_LOCALES.find(
            (availableLocale) => availableLocale.toLowerCase() === normalized.toLowerCase()
          );
          if (exactLocale) {
            return exactLocale;
          }

          const languageMatch = sameLanguageLocale(normalized, AVAILABLE_LOCALES);
          if (languageMatch) {
            return languageMatch;
          }
        }

        return DEFAULT_LOCALE;
      }

      let savedLocale = "";

      try {
        savedLocale = window.localStorage.getItem(LOCALE_STORAGE_KEY) || "";
      } catch (error) {
        savedLocale = "";
      }

      const requestedLocales = savedLocale ? [savedLocale, ...(navigator.languages || [])] : navigator.languages || [];
      const targetLocale = resolveLocale(requestedLocales);
      window.location.replace(`/${targetLocale}/`);
    </script>
  </head>
  <body>
    <main>
      <section aria-labelledby="fallback-locales-heading">
        <h1 id="fallback-locales-heading">40 Below</h1>
        <p>Redirecting to the best language for your browser.</p>
        <p>If you are not redirected, choose a language below.</p>
        <ul>
        <li><a href="/en-US/">English (US)</a></li>
        <li><a href="/en-GB/">English (UK)</a></li>
        <li><a href="/es-ES/">Español</a></li>
        <li><a href="/ja/">日本語</a></li>
        <li><a href="/zh-Hans/">简体中文</a></li>
        </ul>
        <p><a href="/en-US/">Continue to English</a></p>
      </section>
    </main>
  </body>
</html>
